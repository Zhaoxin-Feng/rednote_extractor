<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedExtract Pro - 小红书内容提取与AI分析</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="background-gradient"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <span class="logo-icon">🌅</span>
                    RedExtract Pro
                </h1>
                <p class="tagline">小红书图片提取 · AI 智能分析 · Markdown 导出</p>
            </div>

            <!-- Combined Input Section -->
            <div class="combined-input-section">
                <!-- Link Input -->
                <div class="input-block">
                    <h2 class="input-title">
                        <span class="title-icon">🔗</span>
                        输入小红书链接
                    </h2>
                    <div class="input-container">
                        <input
                            type="text"
                            id="xhsLink"
                            placeholder="粘贴小红书分享链接，如：https://www.xiaohongshu.com/explore/..."
                            class="link-input"
                        >
                        <button id="extractBtn" class="extract-btn">
                            <span>提取内容</span>
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Divider -->
                <div class="input-divider"></div>

                <!-- API Key Configuration -->
                <div class="input-block">
                    <h2 class="input-title">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M8 1L10.5 6L16 7L12 11L13 16L8 13.5L3 16L4 11L0 7L5.5 6L8 1Z" fill="currentColor"/>
                        </svg>
                        OpenRouter API Key
                    </h2>
                    <div class="input-container">
                        <input
                            type="password"
                            id="apiKey"
                            placeholder="sk-or-v1-..."
                            class="api-key-input"
                        >
                        <button id="saveKey" class="save-key-btn">保存</button>
                    </div>
                    <p class="hint">密钥将安全存储在您的浏览器中</p>
                </div>
            </div>
        </header>

        <!-- Post Display Section (Initially Hidden) -->
        <section id="postDisplay" class="post-display" style="display: none;">
            <div class="post-card card">
                <!-- Author Info -->
                <div class="author-section">
                    <img src="https://via.placeholder.com/48" alt="Author" class="author-avatar" id="authorAvatar">
                    <div class="author-info">
                        <h3 class="author-name" id="authorName">作者名称</h3>
                        <time class="post-time" id="postTime">2024-03-18</time>
                    </div>
                </div>

                <!-- Post Title -->
                <h2 class="post-title" id="postTitle">Agent Memory组会汇报（2-1）</h2>

                <!-- Post Content -->
                <div class="post-content" id="postContent">
                    <p>帖子内容将在这里显示...</p>
                </div>

                <!-- Engagement Stats -->
                <div class="stats-container">
                    <div class="stat-item">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 17.5C6.5 17.5 2.5 14.5 2.5 10C2.5 5.5 5.5 2.5 10 2.5C14.5 2.5 17.5 5.5 17.5 10C17.5 14.5 13.5 17.5 10 17.5Z" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M7 10L9 12L13 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span id="likeCount">1042</span>
                        <span class="stat-label">点赞</span>
                    </div>
                    <div class="stat-item">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M5 7.5H15V15C15 16.5 14 17.5 12.5 17.5H7.5C6 17.5 5 16.5 5 15V7.5Z" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M7.5 5V4C7.5 3 8 2.5 9 2.5H11C12 2.5 12.5 3 12.5 4V5" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <span id="collectCount">1503</span>
                        <span class="stat-label">收藏</span>
                    </div>
                    <div class="stat-item">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M17.5 9C17.5 13 14.5 16 10 16C9 16 8 15.8 7.2 15.4L3 17L4.6 12.8C4.2 12 4 11 4 10C4 6 7 3 11 3C15 3 17.5 5 17.5 9Z" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <span id="commentCount">20</span>
                        <span class="stat-label">评论</span>
                    </div>
                    <div class="stat-item">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 3L12 8L17 9L13.5 12.5L14.5 17.5L10 15L5.5 17.5L6.5 12.5L3 9L8 8L10 3Z" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <span id="shareCount">371</span>
                        <span class="stat-label">分享</span>
                    </div>
                </div>

                <!-- Image Gallery -->
                <div class="image-gallery-section">
                    <div class="gallery-header">
                        <h3 class="gallery-title">图片集 (<span id="imageCount">0</span>)</h3>
                        <button id="downloadAllBtn" class="download-all-btn" style="display: none;">
                            <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                                <path d="M10 3V13M10 13L6 9M10 13L14 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M3 15V16C3 16.5 3.5 17 4 17H16C16.5 17 17 16.5 17 16V15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            下载全部图片
                        </button>
                    </div>
                    <div class="image-gallery" id="imageGallery">
                        <!-- Images will be inserted here -->
                    </div>
                </div>
            </div>

            <!-- AI Analysis Section -->
            <div class="ai-section card">
                <h2 class="section-title">
                    <span class="title-icon">✨</span>
                    AI 智能分析
                </h2>

                <div class="ai-controls">
                    <!-- Model Selection -->
                    <div class="control-group">
                        <label for="modelSelect">选择模型</label>
                        <select id="modelSelect" class="model-select">
                            <option value="anthropic/claude-sonnet-4-6">Anthropic Claude Sonnet 4.6 (推荐)</option>
                            <option value="google/gemini-3.1-pro-preview">Google Gemini 3.1 Pro Preview</option>
                            <option value="google/gemini-2.5-flash">Google Gemini 2.5 Flash</option>
                            <option value="openai/gpt-5-nano">OpenAI GPT-5 Nano</option>
                        </select>
                    </div>

                    <!-- Analysis Intensity -->
                    <div class="control-group">
                        <label>分析强度</label>
                        <div class="intensity-selector">
                            <button class="intensity-btn" data-intensity="simple">简单总结</button>
                            <button class="intensity-btn active" data-intensity="detailed">详细梳理</button>
                        </div>
                    </div>

                    <!-- Custom Prompt -->
                    <div class="control-group">
                        <label for="customPrompt">自定义提示词</label>
                        <textarea
                            id="customPrompt"
                            class="prompt-textarea"
                            placeholder="编辑分析提示词..."
                            rows="4"
                        >请详细分析这些图片中的内容，提取关键信息，并以结构化的 Markdown 笔记格式输出。</textarea>
                    </div>

                    <!-- Analyze Button -->
                    <button id="analyzeBtn" class="analyze-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 3L14 8L19 9L15.5 13L16.5 18L12 15.5L7.5 18L8.5 13L5 9L10 8L12 3Z" fill="currentColor"/>
                        </svg>
                        <span>开始 AI 分析</span>
                    </button>

                    <!-- Progress Indicator -->
                    <div id="progressIndicator" class="progress-indicator" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <p class="progress-text">AI 正在分析中，请稍候...</p>
                    </div>
                </div>
            </div>

            <!-- Results Section -->
            <div id="resultsSection" class="results-section card" style="display: none;">
                <div class="results-header">
                    <h2 class="section-title">
                        <span class="title-icon">📝</span>
                        分析结果
                    </h2>
                    <div class="view-toggle">
                        <button class="toggle-btn active" data-view="preview">预览</button>
                        <button class="toggle-btn" data-view="source">源码</button>
                    </div>
                </div>

                <!-- Markdown Preview -->
                <div id="markdownPreview" class="markdown-preview">
                    <!-- Rendered markdown will appear here -->
                </div>

                <!-- Raw Source -->
                <div id="rawSource" class="raw-source" style="display: none;">
                    <pre><code id="sourceCode"></code></pre>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button id="copyMdBtn" class="action-btn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <rect x="7" y="7" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M5 13H4C3.5 13 3 12.5 3 12V4C3 3.5 3.5 3 4 3H12C12.5 3 13 3.5 13 4V5" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        复制 Markdown
                    </button>
                    <button id="downloadMdBtn" class="action-btn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 3V13M10 13L6 9M10 13L14 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M3 15V16C3 16.5 3.5 17 4 17H16C16.5 17 17 16.5 17 16V15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        下载 .md 文件
                    </button>
                    <button id="reanalyzeBtn" class="action-btn secondary">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M17 10C17 13.866 13.866 17 10 17C6.134 17 3 13.866 3 10C3 6.134 6.134 3 10 3C12 3 13.8 3.8 15 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M15 3V5H13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        重新分析
                    </button>
                </div>
            </div>
        </section>
    </div>

    <!-- Image Lightbox -->
    <div id="imageLightbox" class="lightbox" style="display: none;">
        <button class="lightbox-close">&times;</button>
        <button class="lightbox-prev">&#10094;</button>
        <button class="lightbox-next">&#10095;</button>
        <img id="lightboxImage" class="lightbox-image" src="" alt="">
        <div class="lightbox-counter">
            <span id="lightboxCounter"></span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
